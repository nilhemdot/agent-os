name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Typecheck, Lint, Test & Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: source

    strategy:
      fail-fast: false
      matrix:
        node-version: [20.x, 22.x]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: source/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: source/.next/cache
          key: ${{ runner.os }}-next-${{ matrix.node-version }}-${{ hashFiles('source/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-next-${{ matrix.node-version }}-

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
        env:
          PORT: 3737

  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: source

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm
          cache-dependency-path: source/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Audit (non-blocking)
        run: npm audit --audit-level=high || true

  deploy:
    name: Deploy (main only)
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: source

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm
          cache-dependency-path: source/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          PORT: 3737

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: agentic-os-build
          path: |
            source/.next
            source/public
            source/package.json
            source/package-lock.json
            source/next.config.ts
          if-no-files-found: error
