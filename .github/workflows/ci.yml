name: CI

on:
  push:
    branches: [main, m0-security-patch]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.os == 'windows-latest' }}
    # Windows non-blocking: WSL2 is the supported Windows path (Plan v3 §M8); native CRLF/worktree/srt differences tracked in backlog M8-6
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: ['22']

    defaults:
      run:
        # windows-latest defaults to pwsh, which cannot parse the bash-array
        # security-lint steps (R1.4); bash exists on all three runners.
        shell: bash

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: source/package-lock.json

      - name: Install dependencies
        working-directory: source
        run: npm ci

      - name: Type check
        working-directory: source
        run: npm run typecheck

      - name: Lint
        working-directory: source
        run: npm run lint
        continue-on-error: true
        # non-blocking: D-series lint-debt burn-down in progress (M8.18); typecheck/test/eval are the hard gates

      - name: Security lint - forbid child_process in app/features (R1.4)
        working-directory: source
        run: |
          # R1.4: All subprocess launches must route through runner.ts (spawnSubprocess, run, spawnStream)
          # Check for: from imports, require(), and dynamic import() patterns
          PATTERNS=(
            "from ['\"]child_process['\"]"
            "from ['\"]node:child_process['\"]"
            "require\(\s*['\"]child_process['\"]\s*\)"
            "require\(\s*['\"]node:child_process['\"]\s*\)"
            "import\(\s*['\"]child_process['\"]\s*\)"
            "import\(\s*['\"]node:child_process['\"]\s*\)"
          )
          VIOLATIONS=""
          for PATTERN in "${PATTERNS[@]}"; do
            FOUND=$(grep -rE "$PATTERN" src/app src/features 2>/dev/null || true)
            if [ -n "$FOUND" ]; then
              VIOLATIONS="$VIOLATIONS$FOUND"$'\n'
            fi
          done
          if [ -n "$VIOLATIONS" ]; then
            echo "ERROR: Direct child_process imports found in src/app/** or src/features/** (R1.4 violation)"
            echo "$VIOLATIONS"
            echo "Use spawnSubprocess/run/spawnStream from @/lib/runner instead"
            exit 1
          fi
        # Blocking job: fails CI immediately on any child_process import in app/features

      - name: Security lint - ESLint no-restricted-imports (R1.4, AST-level)
        working-directory: source
        run: |
          # AST-level backstop for the grep check above: catches aliased/re-exported
          # static imports and dynamic import() that text patterns can miss.
          # Scoped to the R1.4 rule only so the pre-existing lint backlog (M8.18)
          # cannot fail this job.
          # workspace-relative temp file: /tmp is bash-only on windows runners,
          # and node.exe cannot resolve it
          npx eslint 'src/app/**/*.{js,jsx,ts,tsx}' 'src/features/**/*.{js,jsx,ts,tsx}' \
            --no-error-on-unmatched-pattern --format json > eslint-r14.json || true
          node -e "
            const results = require('./eslint-r14.json');
            const hits = results.flatMap(f => f.messages
              .filter(m => m.ruleId === 'no-restricted-imports')
              .map(m => f.filePath + ':' + m.line + ' ' + m.message));
            if (hits.length) {
              console.error('R1.4 ESLint violations:\n' + hits.join('\n'));
              process.exit(1);
            }
            console.log('R1.4 ESLint check clean (' + results.length + ' files)');
          "
          rm -f eslint-r14.json

      - name: Run tests (includes adversarial suite m8-*.test.ts)
        working-directory: source
        run: npm run test

      - name: Run eval
        working-directory: source
        run: npm run eval
