<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Fireworks</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#070512;touch-action:none;cursor:crosshair;}
  canvas{display:block;width:100vw;height:100vh;}
  #hint{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);
    font:300 12px/1 -apple-system,system-ui,sans-serif;letter-spacing:.18em;
    color:rgba(255,255,255,.18);pointer-events:none;text-transform:uppercase;
    transition:opacity 1.2s;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hint">tap to launch</div>
<script>
(() => {
  "use strict";
  const cv = document.getElementById("c"), ctx = cv.getContext("2d");
  let W, H, DPR, stars = [], rockets = [], parts = [], embers = [], smoke = [];
  const G = 0.045;                       // gravity
  const PAL = [                          // accent palette (h,s,l base)
    [187,82,53],  // cyan  #22d3ee
    [330,87,70],  // magenta #f472b6
    [255,84,73],  // violet #a78bfa
    [33,48,64],   // gold  #d4a574
    [152,40,53]   // emerald #5ab896
  ];
  const rnd = (a, b) => a + Math.random() * (b - a);
  const pick = a => a[(Math.random() * a.length) | 0];

  function resize() {
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    W = window.innerWidth; H = window.innerHeight;
    cv.width = W * DPR; cv.height = H * DPR;
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    stars = [];
    const n = Math.round(W * H / 5200);
    for (let i = 0; i < n; i++)
      stars.push({ x: Math.random() * W, y: Math.random() * H * 0.82,
        r: rnd(0.3, 1.3), p: Math.random() * Math.PI * 2, s: rnd(0.6, 2.2) });
  }
  window.addEventListener("resize", resize);
  resize();

  // ---- rocket ----------------------------------------------------------
  function launch(tx, ty) {
    if (parts.length > 3600) return;       // hard performance guard
    const sx = tx != null ? tx + rnd(-30, 30) : rnd(W * 0.1, W * 0.9);
    // higher apexes (closer to top) so bursts fill the sky, fast fuses
    const ty2 = ty != null ? ty : rnd(H * 0.08, H * 0.4);
    const finale = Math.random() < 0.16;
    const hue = pick(PAL);
    rockets.push({
      x: sx, y: H + 8,
      vx: ((tx != null ? tx : sx) - sx) / 48 + rnd(-0.3, 0.3),
      vy: -Math.sqrt(2 * G * (H - ty2)) * rnd(1.04, 1.12),
      ty: ty2, hue, finale, life: 0,
      shape: pick(["sphere", "ring", "willow", "sparkle", "sphere", "sphere"])
    });
  }

  // ---- explosion -------------------------------------------------------
  function explode(r) {
    const [bh, bs, bl] = r.hue;
    const big = r.finale;
    // denser bursts, but throttle when the field is already busy
    const load = parts.length;
    const scale = load > 2600 ? 0.5 : load > 1800 ? 0.72 : 1;
    let count = Math.round(((big ? 300 : 150) + (Math.random() * 90 | 0)) * scale);
    const power = big ? rnd(6, 8) : rnd(3.6, 5.4);
    const twoTone = Math.random() < 0.55 ? pick(PAL) : r.hue;
    const triTone = Math.random() < 0.4 ? pick(PAL) : null;   // 3-colour bursts

    // central flash
    embers.push({ x: r.x, y: r.y, vx: 0, vy: 0, r: big ? 110 : 68,
      h: bh, s: bs, l: 94, life: 0, max: 18, flash: true });

    for (let i = 0; i < count; i++) {
      let a = Math.random() * Math.PI * 2, sp;
      if (r.shape === "ring") {            // thin expanding ring
        sp = power * rnd(0.92, 1.04);
      } else if (r.shape === "sparkle") {  // spiky / star-like
        sp = power * (Math.random() < 0.5 ? rnd(0.3, 0.5) : rnd(0.9, 1.1));
      } else if (r.shape === "willow") {   // drooping fountain
        a = -Math.PI / 2 + rnd(-1.5, 1.5);
        sp = power * rnd(0.5, 1) * 0.9;
      } else {                             // sphere
        sp = power * Math.sqrt(Math.random());
      }
      let h, s;
      if (triTone && i % 3 === 1) { h = triTone[0]; s = triTone[1]; }
      else if (i % 4 === 0) { h = twoTone[0]; s = twoTone[1]; }
      else { h = bh + rnd(-12, 12); s = bs; }
      parts.push({
        x: r.x, y: r.y,
        vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
        h, s, l: rnd(62, 82),
        life: 0, max: rnd(55, 105) + (big ? 30 : 0),
        drag: r.shape === "willow" ? 0.965 : rnd(0.978, 0.99),
        size: rnd(1.4, 2.6),
        crackle: Math.random() < (big ? 0.3 : 0.16),
        willow: r.shape === "willow"
      });
    }
    // soft smoke puff
    for (let i = 0; i < (big ? 6 : 3); i++)
      smoke.push({ x: r.x + rnd(-15, 15), y: r.y + rnd(-15, 15),
        r: rnd(30, 70), life: 0, max: rnd(110, 180), h: bh });
  }

  function crackleAt(p) {
    const k = 5 + (Math.random() * 4 | 0);
    for (let i = 0; i < k; i++) {
      const a = Math.random() * Math.PI * 2, sp = rnd(0.6, 1.8);
      parts.push({
        x: p.x, y: p.y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
        h: 45, s: 30, l: 90, life: 0, max: rnd(12, 26),
        drag: 0.9, size: rnd(0.8, 1.5), crackle: false, willow: false
      });
    }
  }

  // ---- background ------------------------------------------------------
  function drawBG(t) {
    const g = ctx.createLinearGradient(0, 0, 0, H);
    g.addColorStop(0, "#070512");
    g.addColorStop(0.55, "#0a0719");
    g.addColorStop(1, "#0d0a1f");
    ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
    // ground glow
    const gg = ctx.createRadialGradient(W / 2, H * 1.08, 0, W / 2, H * 1.08, H * 0.6);
    gg.addColorStop(0, "rgba(60,40,90,0.22)");
    gg.addColorStop(1, "rgba(0,0,0,0)");
    ctx.fillStyle = gg; ctx.fillRect(0, H * 0.55, W, H * 0.45);
    // stars
    ctx.save(); ctx.globalCompositeOperation = "lighter";
    for (const s of stars) {
      const tw = 0.45 + 0.55 * (0.5 + 0.5 * Math.sin(t * 0.001 * s.s + s.p));
      ctx.globalAlpha = tw * 0.85;
      ctx.fillStyle = "#cdd6ff";
      ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, 7); ctx.fill();
    }
    ctx.restore();
  }

  // ---- main loop -------------------------------------------------------
  let last = performance.now(), nextAuto = 250, acc = 0;
  function frame(now) {
    const dt = Math.min(2.4, (now - last) / 16.67); last = now;
    // fade trails (additive-friendly dark veil)
    ctx.globalCompositeOperation = "source-over";
    drawBG(now);

    // auto-launch: fast cadence + keep 3-6 rockets always in flight
    acc += now - (frame._p || now); frame._p = now;
    if (acc > nextAuto) {
      acc = 0;
      if (parts.length < 3200) {
        const burst = Math.random() < 0.22 ? 3 : Math.random() < 0.5 ? 2 : 1;
        for (let i = 0; i < burst; i++) setTimeout(() => launch(), i * 90);
      }
      nextAuto = rnd(250, 500);
    }
    // safety net: top up so the sky is never empty of rising rockets
    if (rockets.length < 3 && parts.length < 2800) launch();

    ctx.globalCompositeOperation = "lighter";

    // smoke (subtle, drawn under sparks but additive soft)
    for (let i = smoke.length - 1; i >= 0; i--) {
      const s = smoke[i]; s.life += dt; s.r += 0.25 * dt; s.y -= 0.15 * dt;
      const k = 1 - s.life / s.max;
      if (k <= 0) { smoke.splice(i, 1); continue; }
      const rg = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, s.r);
      rg.addColorStop(0, `hsla(${s.h},40%,60%,${0.05 * k})`);
      rg.addColorStop(1, "rgba(0,0,0,0)");
      ctx.fillStyle = rg;
      ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, 7); ctx.fill();
    }

    // rockets
    for (let i = rockets.length - 1; i >= 0; i--) {
      const r = rockets[i];
      r.vy += G * dt; r.x += r.vx * dt; r.y += r.vy * dt; r.life += dt;
      // glowing sparkle trail
      const tg = ctx.createRadialGradient(r.x, r.y, 0, r.x, r.y, 9);
      tg.addColorStop(0, `hsla(${r.hue[0]},100%,85%,0.9)`);
      tg.addColorStop(1, "rgba(0,0,0,0)");
      ctx.fillStyle = tg;
      ctx.beginPath(); ctx.arc(r.x, r.y, 9, 0, 7); ctx.fill();
      if (Math.random() < 0.8)
        embers.push({ x: r.x + rnd(-1.5, 1.5), y: r.y + rnd(0, 3), vx: rnd(-0.2, 0.2),
          vy: rnd(0.2, 0.8), r: rnd(1, 2.2), h: r.hue[0], s: 80, l: 80, life: 0, max: rnd(14, 26) });
      if (r.vy >= -0.6 || r.y <= r.ty) { explode(r); rockets.splice(i, 1); }
    }

    // particles
    for (let i = parts.length - 1; i >= 0; i--) {
      const p = parts[i];
      p.vy += (p.willow ? G * 0.55 : G) * dt;
      p.vx *= Math.pow(p.drag, dt); p.vy *= Math.pow(p.drag, dt);
      p.x += p.vx * dt; p.y += p.vy * dt; p.life += dt;
      const k = 1 - p.life / p.max;
      if (k <= 0) { parts.splice(i, 1); continue; }
      if (p.crackle && p.life > p.max * 0.55 && Math.random() < 0.08) {
        crackleAt(p); p.crackle = false;
      }
      const l = p.l * (0.4 + 0.6 * k) + (k > 0.85 ? 18 : 0);
      const rad = p.size * (0.6 + k);
      const gg2 = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, rad * 2.4);
      gg2.addColorStop(0, `hsla(${p.h},${p.s}%,${Math.min(100, l)}%,${k})`);
      gg2.addColorStop(0.4, `hsla(${p.h},${p.s}%,${l * 0.7}%,${k * 0.5})`);
      gg2.addColorStop(1, "rgba(0,0,0,0)");
      ctx.fillStyle = gg2;
      ctx.beginPath(); ctx.arc(p.x, p.y, rad * 2.4, 0, 7); ctx.fill();
    }

    // embers / flashes
    for (let i = embers.length - 1; i >= 0; i--) {
      const e = embers[i];
      if (!e.flash) { e.vy += G * 0.3 * dt; e.x += e.vx * dt; e.y += e.vy * dt; }
      e.life += dt;
      const k = 1 - e.life / e.max;
      if (k <= 0) { embers.splice(i, 1); continue; }
      const rr = e.flash ? e.r * (1.1 - k * 0.5) : e.r;
      const eg = ctx.createRadialGradient(e.x, e.y, 0, e.x, e.y, rr * (e.flash ? 1 : 3));
      const a = e.flash ? k * k * 0.8 : k * 0.9;
      eg.addColorStop(0, `hsla(${e.h},${e.s}%,${e.l}%,${a})`);
      eg.addColorStop(1, "rgba(0,0,0,0)");
      ctx.fillStyle = eg;
      ctx.beginPath(); ctx.arc(e.x, e.y, rr * (e.flash ? 1 : 3), 0, 7); ctx.fill();
    }

    requestAnimationFrame(frame);
  }

  // ---- input -----------------------------------------------------------
  let hintEl = document.getElementById("hint"), hinted = false;
  function shoot(x, y) {
    if (!hinted) { hinted = true; hintEl.style.opacity = "0"; }
    launch(x, y);
  }
  cv.addEventListener("pointerdown", e => shoot(e.clientX, e.clientY));
  // immediate opening volley so the screen is alive in the first second
  for (let i = 0; i < 5; i++) setTimeout(() => launch(), i * 120);
  setTimeout(() => { hintEl.style.opacity = "0"; }, 7000);
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
